<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Spin Wheel - ហ្គេមបង្វិលកងសំណាង</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kantumruy Pro', 'Inter', sans-serif;
            background: radial-gradient(circle, #1a1a2e 0%, #16213e 100%);
            overflow-x: hidden;
        }

        .wheel-container {
            perspective: 1000px;
        }

        #wheel {
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.5));
        }

        .pointer {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            z-index: 20;
        }

        /* Glowing effect for the button */
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.6);
            transform: scale(1.05);
        }

        .btn-glow:active {
            transform: scale(0.95);
        }

        /* Custom Modal animation */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="text-center mb-8">
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-2 tracking-tight">
            បង្វិលកង <span class="text-emerald-400">សំណាង</span>
        </h1>
        <p class="text-gray-400">សាកល្បងសំណាងរបស់អ្នកដើម្បីឈ្នះរង្វាន់ដ៏អស្ចារ្យ!</p>
    </div>

    <div class="relative wheel-container mb-8">
        <!-- Pointer (ម្ជុលចង្អុល) -->
        <div class="pointer absolute top-[-20px] left-1/2 -translate-x-1/2 w-10 h-12 bg-red-500" style="clip-path: polygon(50% 100%, 0 0, 100% 0);">
            <div class="w-full h-1/2 bg-red-600"></div>
        </div>

        <!-- The Wheel (កងបង្វិល) -->
        <canvas id="wheel" width="400" height="400" class="rounded-full border-8 border-slate-800"></canvas>

        <!-- Center Hub -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-12 h-12 bg-white rounded-full border-4 border-slate-800 shadow-xl z-10 flex items-center justify-center">
            <div class="w-4 h-4 bg-slate-800 rounded-full"></div>
        </div>
    </div>

    <div class="flex flex-col items-center gap-4">
        <button id="spinBtn" class="btn-glow px-10 py-4 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold text-xl rounded-full transition-all duration-300 shadow-lg">
            ចាប់ផ្ដើមបង្វិល
        </button>
        
        <div id="status" class="text-emerald-400 font-medium h-6"></div>
    </div>

    <!-- Result Modal (ផ្ទាំងបង្ហាញលទ្ធផល) -->
    <div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4">
        <div class="bg-slate-900 border-2 border-emerald-500 p-8 rounded-3xl max-w-sm w-full text-center animate-pop">
            <div class="text-5xl mb-4">🎉</div>
            <h2 class="text-2xl font-bold text-white mb-2">អបអរសាទរ!</h2>
            <p class="text-gray-300 mb-6">អ្នកទទួលបាន:</p>
            <div id="prizeResult" class="text-3xl font-bold text-emerald-400 mb-8 px-4 py-2 bg-emerald-500/10 rounded-xl"></div>
            <button id="closeModal" class="w-full py-3 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold rounded-xl transition-colors">
                យល់ព្រម
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const statusText = document.getElementById('status');
        const modal = document.getElementById('modal');
        const prizeResult = document.getElementById('prizeResult');
        const closeModal = document.getElementById('closeModal');

        const prizes = [
            { text: "រង្វាន់ធំ $100", color: "#f59e0b" },
            { text: "សាកល្បងម្ដងទៀត", color: "#334155" },
            { text: "បញ្ចុះតម្លៃ ៥០%", color: "#10b981" },
            { text: "អត់សំណាងទេ", color: "#64748b" },
            { text: "កាតទឹកប្រាក់ ១$", color: "#3b82f6" },
            { text: "រង្វាន់ពិសេស", color: "#8b5cf6" },
            { text: "កាដូភ្ញាក់ផ្អើល", color: "#ec4899" },
            { text: "ស៊យហើយ!", color: "#ef4444" }
        ];

        const numPrizes = prizes.length;
        const arc = (2 * Math.PI) / numPrizes;
        let currentRotation = 0;
        let isSpinning = false;

        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            prizes.forEach((prize, i) => {
                const angle = i * arc;
                
                // Draw Sector
                ctx.beginPath();
                ctx.fillStyle = prize.color;
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arc);
                ctx.lineTo(centerX, centerY);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw Text
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 14px 'Kantumruy Pro'";
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 4;
                ctx.fillText(prize.text, radius - 20, 5);
                ctx.restore();
            });
        }

        function spin() {
            if (isSpinning) return;

            isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.classList.add('opacity-50', 'cursor-not-allowed');
            statusText.innerText = "កំពុងបង្វិល...";

            // Generate random rotation: current + 5 to 10 full spins + random offset
            const extraSpins = (Math.floor(Math.random() * 5) + 5) * 360;
            const randomOffset = Math.floor(Math.random() * 360);
            const totalRotation = currentRotation + extraSpins + randomOffset;
            
            currentRotation = totalRotation;
            canvas.style.transform = `rotate(${totalRotation}deg)`;

            // Wait for animation to finish (5 seconds match CSS transition)
            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;
                spinBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                statusText.innerText = "";
                
                calculateResult(totalRotation);
            }, 5000);
        }

        function calculateResult(rotation) {
            // Normalize rotation to 0-360 degrees
            const actualDeg = rotation % 360;
            
            // The pointer is at the top (270 degrees in canvas math)
            // The wheel rotates clockwise. 
            // We need to find which slice is at the top position.
            const index = Math.floor((360 - actualDeg + 270) % 360 / (360 / numPrizes));
            
            showModal(prizes[index].text);
        }

        function showModal(text) {
            prizeResult.innerText = text;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        closeModal.onclick = () => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };

        spinBtn.addEventListener('click', spin);

        // Initial draw
        drawWheel();

        // Responsive handling
        window.addEventListener('resize', () => {
            // If we had dynamic sizing, we would re-init here
            drawWheel();
        });
    </script>
</body>
</html>
